name: ZiroEdge
options:
  bundleIdPrefix: com.zanish-labs
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  SwiftLlama:
    path: Packages/swift-llama-cpp

targets:
  ZiroEdge:
    type: application
    platform: iOS
    sources:
      - path: ZiroEdge
        excludes:
          - "**/*.xcassets"
      - path: ZiroEdge/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zanish-labs.ziroedge
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 36V92GAJBT
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - package: SwiftLlama
        product: SwiftLlama
    entitlements:
      path: ZiroEdge/ZiroEdge.entitlements
      properties:
        com.apple.security.app-sandbox: true

  ZiroEdgeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ZiroEdgeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zanish-labs.ziroedge.tests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 36V92GAJBT
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: ZiroEdge
      - package: SwiftLlama
        product: SwiftLlama

  ZiroEdgeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ZiroEdgeUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zanish-labs.ziroedge.uitests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 36V92GAJBT
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: ZiroEdge

schemes:
  ZiroEdge:
    build:
      targets:
        ZiroEdge: all
        ZiroEdgeTests: [test]
    test:
      targets:
        - ZiroEdgeTests
  ZiroEdgeUITests:
    build:
      targets:
        ZiroEdge: all
        ZiroEdgeUITests: [test]
    test:
      targets:
        - ZiroEdgeUITests
